<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOL 二段监控 Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&display=swap');

  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  html { height:100%; }
  :root {
    --bg0:#060a14; --bg1:#0a0f1e; --bg2:#0c1222; --bg3:#0f172a;
    --bd:#1e293b; --bd2:#334155;
    --t0:#f1f5f9; --t1:#e2e8f0; --t2:#94a3b8; --t3:#64748b; --t4:#475569;
    --cyan:#22d3ee; --cyan2:#0ea5e9; --grn:#22c55e; --red:#ef4444;
    --org:#f97316; --yel:#f59e0b; --pur:#a78bfa; --blu:#3b82f6;
    --bluL:#7dd3fc; --purL:#c4b5fd;
  }
  body {
    font-family:'JetBrains Mono','Fira Code',monospace;
    background:var(--bg0); color:var(--t1);
    min-height:100%; display:flex; flex-direction:column;
  }
  ::-webkit-scrollbar{width:5px;height:5px}
  ::-webkit-scrollbar-track{background:var(--bg2)}
  ::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}

  .hdr{
    position:sticky;top:0;z-index:20;
    display:flex;align-items:center;justify-content:space-between;
    padding:12px 20px;gap:12px;flex-wrap:wrap;
    background:var(--bg2);border-bottom:1px solid var(--bd);
  }
  .hdr-l{display:flex;align-items:center;gap:12px}
  .logo{
    width:34px;height:34px;border-radius:8px;flex-shrink:0;
    background:linear-gradient(135deg,var(--cyan2),#8b5cf6);
    display:flex;align-items:center;justify-content:center;
    font-size:17px;font-weight:900;color:#fff;
  }
  .hdr-t{font-size:14px;font-weight:700;color:var(--t0)}
  .hdr-s{font-size:10px;color:var(--t3);margin-top:1px}
  .hdr-r{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .sinput{
    padding:6px 10px;background:var(--bg3);border:1px solid var(--bd2);
    border-radius:5px;color:var(--t1);font-size:11px;width:160px;
    outline:none;font-family:inherit;
  }
  .pill{
    display:inline-flex;align-items:center;gap:5px;
    padding:5px 10px;border-radius:5px;font-size:11px;white-space:nowrap;
  }
  .dot{width:6px;height:6px;border-radius:50%;animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  .btn-add{
    padding:6px 14px;border-radius:5px;border:none;
    background:linear-gradient(135deg,var(--cyan2),#8b5cf6);
    color:#fff;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;
    white-space:nowrap;
  }
  .btn-add:hover{filter:brightness(1.15)}

  .twrap{flex:1;overflow-x:auto;padding:0 12px 56px}
  table{width:100%;border-collapse:collapse;font-size:12px;table-layout:auto}
  thead th{
    padding:9px 10px;text-align:right;cursor:pointer;user-select:none;
    color:var(--t3);font-size:10px;font-weight:700;letter-spacing:.06em;
    text-transform:uppercase;white-space:nowrap;
    border-bottom:1px solid var(--bd);
    position:sticky;top:0;background:var(--bg1);z-index:5;
  }
  thead th.on{color:var(--cyan)}
  thead th.l{text-align:left}
  thead th.c{text-align:center}

  tbody tr.row{cursor:pointer;transition:background .12s;border-bottom:1px solid #0d1320}
  tbody tr.row:hover{background:var(--bg2)}
  tbody tr.row.xp{background:var(--bg3);border-bottom:none}
  td{padding:10px;text-align:right;vertical-align:middle}
  td.l{text-align:left}
  td.c{text-align:center}

  .scell{display:flex;align-items:center;gap:7px}
  .sico{
    width:26px;height:26px;border-radius:5px;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    font-size:10px;font-weight:800;color:#fff;
  }
  .sn{font-size:12px;font-weight:700;color:var(--t0)}
  .st{font-size:9px;color:var(--t3);font-weight:400;margin-top:1px}

  .tb{
    display:inline-flex;align-items:center;gap:3px;
    padding:2px 7px;border-radius:3px;font-size:10px;font-weight:600;
    font-family:monospace;white-space:nowrap;
  }
  .tb.sp{background:rgba(124,45,18,.5);border:1px solid rgba(220,38,38,.35);color:#fca5a5}
  .tb.up{background:rgba(20,83,45,.5);border:1px solid rgba(22,163,74,.35);color:#86efac}
  .tb.dn{background:rgba(127,29,29,.5);border:1px solid rgba(220,38,38,.22);color:#fca5a5}
  .tb.fl{background:rgba(30,41,59,.5);border:1px solid rgba(71,85,105,.22);color:var(--t2)}

  .clink{
    color:var(--bluL);text-decoration:none;font-size:10px;
    padding:2px 7px;border-radius:3px;
    background:rgba(14,165,233,.06);border:1px solid rgba(14,165,233,.12);
    white-space:nowrap;
  }
  .clink:hover{background:rgba(14,165,233,.15)}

  .bdel{
    background:transparent;border:1px solid rgba(127,29,29,.22);
    color:var(--red);cursor:pointer;border-radius:3px;
    padding:2px 7px;font-size:10px;font-family:inherit;opacity:.45;
  }
  .bdel:hover{opacity:1}

  .drow td{background:var(--bg2);border-bottom:2px solid var(--bd);padding:0!important}
  .din{padding:14px 16px;display:flex;gap:20px;flex-wrap:wrap}
  .dleft{flex:1 1 480px;min-width:0}
  .dright{flex:0 0 260px}
  .dtit{font-size:11px;font-weight:600;color:var(--t2);margin-bottom:8px;display:flex;align-items:center;gap:6px}
  .dtit small{font-size:9px;color:var(--t3)}
  .cbox{background:var(--bg1);border-radius:6px;padding:10px;border:1px solid var(--bd);overflow-x:auto}
  .mgrid{
    background:var(--bg1);border-radius:6px;padding:12px;border:1px solid var(--bd);
    display:grid;grid-template-columns:1fr 1fr;gap:8px 14px;
  }
  .ml{font-size:9px;color:var(--t4)}
  .mv{font-size:11px;font-weight:600;color:var(--t1)}
  .mv.pos{color:var(--grn)}.mv.neg{color:var(--red)}
  .lrow{margin-top:10px;display:flex;gap:6px;flex-wrap:wrap}
  .elink{
    font-size:9px;color:var(--bluL);text-decoration:none;
    padding:3px 8px;border-radius:3px;
    background:rgba(14,165,233,.06);border:1px solid rgba(14,165,233,.12);
  }
  .elink:hover{background:rgba(14,165,233,.15)}

  .empty{text-align:center;padding:60px 20px;color:var(--t4)}
  .empty b{font-size:36px;display:block;margin-bottom:10px}

  .ftr{
    position:fixed;bottom:0;left:0;right:0;padding:7px 20px;
    background:var(--bg2);border-top:1px solid var(--bd);
    display:flex;justify-content:space-between;align-items:center;
    font-size:9px;color:var(--t4);z-index:20;
  }

  .mbg{
    position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;
    align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(3px);
  }
  .mdl{
    background:var(--bg3);border:1px solid var(--bd);border-radius:10px;
    padding:24px;width:420px;max-width:92vw;
  }
  .mdl h3{margin-bottom:16px;font-size:15px;font-weight:600;color:var(--t1)}
  .mdl label{display:block;font-size:11px;color:var(--t2);margin-bottom:5px}
  .mdl input{
    width:100%;padding:8px 10px;background:var(--bg1);border:1px solid var(--bd2);
    border-radius:5px;color:var(--t1);font-size:12px;font-family:monospace;
    outline:none;margin-bottom:14px;
  }
  .mact{display:flex;gap:10px;justify-content:flex-end}
  .mcan{
    padding:7px 18px;border-radius:5px;border:1px solid var(--bd2);
    background:transparent;color:var(--t2);cursor:pointer;font-size:12px;font-family:inherit;
  }
  .mok{
    padding:7px 18px;border-radius:5px;border:none;
    background:var(--cyan2);color:#fff;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;
  }
</style>
</head>
<body>
<div id="app"><div style="display:flex;align-items:center;justify-content:center;height:100vh;color:var(--t3);font-size:13px">加载中...</div></div>
<script>
(function(){
"use strict";

var API = location.origin;
var POLL = 5000;
var S = { coins:[], exp:null, sf:'current_heat_score', sa:false, filt:'', conn:false, lu:null, modal:false };

// ===== Safe helpers =====
function N(v){ var n=Number(v); return isFinite(n)?n:0; }
function fN(n,d){n=N(n);if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return n.toFixed(d||0);}
function fU(n){return '$'+fN(n);}
function fP(n){n=N(n);return(n>=0?'+':'')+n.toFixed(1)+'%';}
function fAge(h){h=N(h);if(h<1)return Math.max(0,Math.floor(h*60))+'m';if(h<24)return h.toFixed(1)+'h';return(h/24).toFixed(1)+'d';}
function tAgo(s){if(!s)return'-';var d=(Date.now()-new Date(s).getTime())/1000;if(d<0)return'now';if(d<60)return Math.floor(d)+'s';if(d<3600)return Math.floor(d/60)+'m';return Math.floor(d/3600)+'h';}
function E(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function norm(c){
  if(!c) c={};
  return {
    contract_address:c.contract_address||'', symbol:c.symbol||'???', name:c.name||'',
    fdv:N(c.fdv), liquidity:N(c.liquidity), volume_24h:N(c.volume_24h), holders:N(c.holders),
    price:N(c.price), price_change_5m:N(c.price_change_5m), price_change_1h:N(c.price_change_1h),
    price_change_6h:N(c.price_change_6h), price_change_24h:N(c.price_change_24h),
    age_hours:N(c.age_hours), current_heat_score:N(c.current_heat_score),
    heat_trend:c.heat_trend||'flat', heat_delta_percent:N(c.heat_delta_percent),
    heat_history:Array.isArray(c.heat_history)?c.heat_history:[],
    fdv_history:Array.isArray(c.fdv_history)?c.fdv_history:[],
    lp_fdv_ratio:N(c.lp_fdv_ratio||(N(c.fdv)>0?N(c.liquidity)/N(c.fdv):0)),
    status:c.status||'active', security_passed:!!c.security_passed,
    lp_locked:!!c.lp_locked, rugcheck_status:c.rugcheck_status||'',
    gmgn_url:c.gmgn_url||('https://gmgn.ai/sol/token/'+(c.contract_address||'')),
  };
}

// ===== API =====
function load(){
  fetch(API+'/api/coins').then(function(r){
    if(!r.ok) throw new Error(r.status);
    return r.json();
  }).then(function(d){
    S.coins=(d.coins||[]).map(norm);
    S.conn=true;
    S.lu=new Date();
    draw();
  }).catch(function(){
    if(!S.conn && S.coins.length===0) S.coins=mock();
    S.lu=new Date();
    draw();
  });
}

function apiDel(ca){
  if(S.conn){fetch(API+'/api/coins/'+ca,{method:'DELETE'}).catch(function(){});}
  S.coins=S.coins.filter(function(c){return c.contract_address!==ca;});
  draw();
}

function apiAdd(ca,sym){
  if(S.conn){fetch(API+'/api/coins',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contract_address:ca,symbol:sym})}).catch(function(){});}
  S.modal=false; load();
}

// ===== Mock =====
function mock(){
  var ss=['BONK','WIF','POPCAT','MEW','MYRO','BOME','SLERF','PENG'];
  var out=[];
  for(var si=0;si<ss.length;si++){
    var s=ss[si], age=2+Math.random()*20, fdv=2e5+Math.random()*5e6, liq=5e4+Math.random()*5e5;
    var vol=3e5+Math.random()*3e6, hs=100+Math.random()*5000;
    var hh=[], p=hs*.3, len=Math.min(Math.floor(age*4),30);
    for(var j=0;j<len;j++){
      p=Math.max(10,p*(1+(Math.random()-.45)*.4));
      hh.push({heat_score:+p.toFixed(1),mentions:5+(Math.random()*60|0),avg_eng:+(2+Math.random()*40).toFixed(2),kol_count:(Math.random()*5|0),kol_ratio:+(Math.random()*.3).toFixed(3),ca_mention_ratio:+(Math.random()*.5).toFixed(3),total_engagement:50+(Math.random()*500|0),timestamp:new Date(Date.now()-(len-j)*9e5).toISOString()});
    }
    hh.push({heat_score:+hs.toFixed(1),mentions:5+(Math.random()*60|0),avg_eng:+(2+Math.random()*40).toFixed(2),kol_count:(Math.random()*5|0),kol_ratio:+(Math.random()*.3).toFixed(3),ca_mention_ratio:+(Math.random()*.5).toFixed(3),total_engagement:50+(Math.random()*500|0),timestamp:new Date().toISOString()});
    // 生成FDV历史 (与hh对齐)
    var fh=[], mfdv=fdv*.4, mhold=300+Math.random()*2000;
    for(var fi=0;fi<hh.length;fi++){mfdv=Math.max(50000,mfdv*(1+((Math.random()-.42)*.15)));mhold=Math.max(50,mhold*(1+(Math.random()-.35)*.08));fh.push({fdv:Math.round(mfdv),holders:Math.round(mhold),timestamp:hh[fi].timestamp});}
    var pv=hh.length>1?hh[hh.length-2].heat_score:hs, dt=pv>0?((hs-pv)/pv)*100:0;
    var ca='So';for(var k=0;k<40;k++)ca+='ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789'[Math.random()*56|0];
    out.push(norm({contract_address:ca,symbol:s,name:s+' Token',fdv:fdv,liquidity:liq,volume_24h:vol,holders:500+(Math.random()*1e4|0),price:fdv/(1e9+Math.random()*1e10),price_change_5m:(Math.random()-.5)*20,price_change_1h:(Math.random()-.5)*40,price_change_6h:(Math.random()-.5)*80,price_change_24h:(Math.random()-.5)*100,age_hours:age,current_heat_score:hs,heat_trend:dt>50?'spike':dt>10?'up':dt<-20?'down':'flat',heat_delta_percent:dt,heat_history:hh,fdv_history:fh,lp_fdv_ratio:liq/fdv,status:'active',security_passed:true,lp_locked:Math.random()>.2,rugcheck_status:Math.random()>.3?'Good':'Warning'}));
  }
  return out;
}

// ===== Sparkline SVG =====
function spark(data, w, h){
  w=w||120; h=h||30;
  if(!data||data.length<2) return '<svg width="'+w+'" height="'+h+'"><text x="'+(w/2)+'" y="'+(h/2)+'" text-anchor="middle" dominant-baseline="middle" fill="#475569" font-size="9">无数据</text></svg>';
  var vals=[], i;
  for(i=0;i<data.length;i++) vals.push(N(data[i].heat_score));
  var mn=vals[0],mx=vals[0];
  for(i=1;i<vals.length;i++){if(vals[i]<mn)mn=vals[i];if(vals[i]>mx)mx=vals[i];}
  var rg=mx-mn||1, pad=2;
  var last=vals[vals.length-1], prev=vals[vals.length>1?vals.length-2:0];
  var col=last>prev*1.1?'#22c55e':last<prev*.9?'#ef4444':'#22d3ee';
  var pts='';
  for(i=0;i<vals.length;i++){
    var x=pad+(i/(vals.length-1))*(w-pad*2);
    var y=h-pad-((vals[i]-mn)/rg)*(h-pad*2);
    if(i>0) pts+=' ';
    pts+=x.toFixed(1)+','+y.toFixed(1);
  }
  var lx=(pad+(w-pad*2)).toFixed(1);
  var ly=(h-pad-((last-mn)/rg)*(h-pad*2)).toFixed(1);
  var area=pad+','+(h-pad)+' '+pts+' '+lx+','+(h-pad);
  return '<svg width="'+w+'" height="'+h+'" style="display:block"><polygon points="'+area+'" fill="'+col+'" opacity="0.12"/><polyline points="'+pts+'" fill="none" stroke="'+col+'" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="'+lx+'" cy="'+ly+'" r="2.5" fill="'+col+'"/></svg>';
}

// ===== Detail chart: Heat + FDV + Holders =====
function dchart(data, fdvData, w, h){
  w=w||600; h=h||200;
  if(!data||data.length<2) return '<div style="padding:20px;text-align:center;color:#475569;font-size:11px">热度数据不足, 等待更多更新...</div>';
  var i, n=data.length;

  // --- Heat data (left Y, cyan) ---
  var hVals=[], ments=[];
  for(i=0;i<n;i++){hVals.push(N(data[i].heat_score));ments.push(N(data[i].mentions));}
  var hMn=hVals[0],hMx=hVals[0];
  for(i=1;i<n;i++){if(hVals[i]<hMn)hMn=hVals[i];if(hVals[i]>hMx)hMx=hVals[i];}
  hMn*=.8; hMx*=1.1; var hRg=hMx-hMn||1;

  // --- FDV data (right Y, orange dashed) ---
  var hasFdv=fdvData&&fdvData.length>=2;
  var fVals=[], holdVals=[];
  if(hasFdv){for(i=0;i<fdvData.length;i++){fVals.push(N(fdvData[i].fdv));holdVals.push(N(fdvData[i].holders));}}
  var fMn=0,fMx=0,fRg=1;
  if(fVals.length>=2){
    fMn=fVals[0];fMx=fVals[0];
    for(i=1;i<fVals.length;i++){if(fVals[i]<fMn)fMn=fVals[i];if(fVals[i]>fMx)fMx=fVals[i];}
    fMn*=.9; fMx*=1.1; fRg=fMx-fMn||1;
  }

  // --- Holders data (own scale, green dotted) ---
  var hasHold=holdVals.length>=2;
  var hdMn=0,hdMx=0,hdRg=1;
  if(hasHold){
    hdMn=holdVals[0];hdMx=holdVals[0];
    for(i=1;i<holdVals.length;i++){if(holdVals[i]<hdMn)hdMn=holdVals[i];if(holdVals[i]>hdMx)hdMx=holdVals[i];}
    hdMn*=.9; hdMx*=1.1; hdRg=hdMx-hdMn||1;
  }

  // --- Layout ---
  var pxL=48, pxR=hasFdv?56:20, py=22, pb=38;
  var cw=w-pxL-pxR, ch=h-py-pb;
  var mxM=ments[0];for(i=1;i<n;i++)if(ments[i]>mxM)mxM=ments[i];mxM=mxM||1;
  var bw=Math.max(2,Math.min(7,cw/n*.6));
  var gid='hg'+Math.random().toString(36).slice(2,7);

  var o='<svg width="'+w+'" height="'+h+'" style="display:block">';
  o+='<defs><linearGradient id="'+gid+'" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#22d3ee"/><stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/></linearGradient></defs>';

  // --- Grid lines (heat Y left) ---
  for(i=0;i<5;i++){
    var v=hMn+(hRg*i/4), y=py+ch-((v-hMn)/hRg)*ch;
    o+='<line x1="'+pxL+'" y1="'+y.toFixed(1)+'" x2="'+(w-pxR)+'" y2="'+y.toFixed(1)+'" stroke="#1e293b" stroke-width="0.5"/>';
    o+='<text x="'+(pxL-5)+'" y="'+(y+3).toFixed(1)+'" text-anchor="end" fill="#0ea5e9" font-size="8" font-family="monospace">'+fN(v)+'</text>';
  }

  // --- Right Y-axis labels (FDV) ---
  if(hasFdv){
    for(i=0;i<5;i++){
      var fv=fMn+(fRg*i/4), fy=py+ch-((fv-fMn)/fRg)*ch;
      o+='<text x="'+(w-pxR+5)+'" y="'+(fy+3).toFixed(1)+'" text-anchor="start" fill="#f97316" font-size="8" font-family="monospace">'+fU(fv)+'</text>';
    }
    o+='<line x1="'+(w-pxR)+'" y1="'+py+'" x2="'+(w-pxR)+'" y2="'+(py+ch)+'" stroke="#f9731630" stroke-width="1"/>';
  }

  // --- Mention bars (background) ---
  for(i=0;i<n;i++){
    var bx=pxL+(i/(n-1))*cw, bh2=(ments[i]/mxM)*ch*.25;
    o+='<rect x="'+(bx-bw/2).toFixed(1)+'" y="'+(py+ch-bh2).toFixed(1)+'" width="'+bw+'" height="'+bh2.toFixed(1)+'" fill="#3b82f6" opacity="0.12" rx="1"/>';
  }

  // --- Align helper for fdv/holders arrays (right-align to heat timeline) ---
  var fLen=hasFdv?Math.min(fVals.length,n):0;
  var fOff=hasFdv?fVals.length-fLen:0;
  var hOff2=n-fLen;

  // --- Holders curve (green dotted, draw first = bottom layer) ---
  if(hasHold&&fLen>=2){
    var hdPts=[];
    for(i=0;i<fLen;i++){
      var hx=pxL+((hOff2+i)/(n-1))*cw;
      var hy=py+ch-((holdVals[fOff+i]-hdMn)/hdRg)*ch;
      hdPts.push({x:hx,y:hy});
    }
    var hdStr='';for(i=0;i<hdPts.length;i++){if(i>0)hdStr+=' ';hdStr+=hdPts[i].x.toFixed(1)+','+hdPts[i].y.toFixed(1);}
    o+='<polyline points="'+hdStr+'" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="2,3" opacity="0.55"/>';
    var hdLast=hdPts[hdPts.length-1];
    o+='<circle cx="'+hdLast.x.toFixed(1)+'" cy="'+hdLast.y.toFixed(1)+'" r="2.5" fill="#22c55e" stroke="#0c1222" stroke-width="0.8" opacity="0.7"/>';
  }

  // --- FDV curve (orange dashed) ---
  if(hasFdv&&fLen>=2){
    var fPts=[];
    for(i=0;i<fLen;i++){
      var fx=pxL+((hOff2+i)/(n-1))*cw;
      var fy2=py+ch-((fVals[fOff+i]-fMn)/fRg)*ch;
      fPts.push({x:fx,y:fy2});
    }
    var fPstr='';for(i=0;i<fPts.length;i++){if(i>0)fPstr+=' ';fPstr+=fPts[i].x.toFixed(1)+','+fPts[i].y.toFixed(1);}
    o+='<polygon points="'+fPts[0].x.toFixed(1)+','+(py+ch)+' '+fPstr+' '+fPts[fPts.length-1].x.toFixed(1)+','+(py+ch)+'" fill="#f97316" opacity="0.06"/>';
    o+='<polyline points="'+fPstr+'" fill="none" stroke="#f97316" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="4,3" opacity="0.7"/>';
    var flast=fPts[fPts.length-1];
    o+='<circle cx="'+flast.x.toFixed(1)+'" cy="'+flast.y.toFixed(1)+'" r="3" fill="#f97316" stroke="#0c1222" stroke-width="1" opacity="0.8"/>';
  }

  // --- Heat Score curve (cyan solid, top layer) ---
  var hPts=[];
  for(i=0;i<n;i++){hPts.push({x:pxL+(i/(n-1))*cw, y:py+ch-((hVals[i]-hMn)/hRg)*ch});}
  var hPstr='';for(i=0;i<hPts.length;i++){if(i>0)hPstr+=' ';hPstr+=hPts[i].x.toFixed(1)+','+hPts[i].y.toFixed(1);}
  o+='<polygon points="'+pxL+','+(py+ch)+' '+hPstr+' '+hPts[hPts.length-1].x.toFixed(1)+','+(py+ch)+'" fill="url(#'+gid+')" opacity="0.25"/>';
  o+='<polyline points="'+hPstr+'" fill="none" stroke="#22d3ee" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>';
  for(i=0;i<hPts.length;i++){
    var cr=i===hPts.length-1?3.5:1.5, cf=i===hPts.length-1?'#22d3ee':'#0e7490';
    o+='<circle cx="'+hPts[i].x.toFixed(1)+'" cy="'+hPts[i].y.toFixed(1)+'" r="'+cr+'" fill="'+cf+'" stroke="#0c1222" stroke-width="0.8"/>';
  }

  // --- Time labels ---
  var step=Math.max(1,Math.floor(n/7));
  for(i=0;i<n;i++){
    if(i%step!==0&&i!==n-1)continue;
    var tx=pxL+(i/(n-1))*cw, t=new Date(data[i].timestamp);
    var thr=String(t.getHours()).padStart(2,'0'), tmi=String(t.getMinutes()).padStart(2,'0');
    o+='<text x="'+tx.toFixed(1)+'" y="'+(h-5)+'" text-anchor="middle" fill="#64748b" font-size="8" font-family="monospace">'+thr+':'+tmi+'</text>';
  }

  // --- Legend (two rows if needed) ---
  var lgX=pxL+3, lgY=h-20;
  o+='<circle cx="'+lgX+'" cy="'+lgY+'" r="2.5" fill="#22d3ee"/>';
  o+='<text x="'+(lgX+7)+'" y="'+(lgY+3)+'" fill="#94a3b8" font-size="7.5">Heat</text>';

  o+='<rect x="'+(lgX+38)+'" y="'+(lgY-3.5)+'" width="6" height="6" fill="#3b82f6" opacity="0.35" rx="1"/>';
  o+='<text x="'+(lgX+48)+'" y="'+(lgY+3)+'" fill="#94a3b8" font-size="7.5">Mentions</text>';

  if(hasFdv){
    o+='<line x1="'+(lgX+103)+'" y1="'+lgY+'" x2="'+(lgX+116)+'" y2="'+lgY+'" stroke="#f97316" stroke-width="1.8" stroke-dasharray="3,2" opacity="0.7"/>';
    o+='<text x="'+(lgX+120)+'" y="'+(lgY+3)+'" fill="#f97316" font-size="7.5" opacity="0.85">FDV</text>';
  }

  if(hasHold){
    var hlgX=hasFdv?(lgX+145):(lgX+103);
    o+='<line x1="'+hlgX+'" y1="'+lgY+'" x2="'+(hlgX+12)+'" y2="'+lgY+'" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="2,2" opacity="0.6"/>';
    o+='<text x="'+(hlgX+16)+'" y="'+(lgY+3)+'" fill="#22c55e" font-size="7.5" opacity="0.8">Holders</text>';
  }

  return o+'</svg>';
}

// ===== Trend badge =====
function tbdg(trend,delta){
  var m={spike:['🔥','SPIKE','sp'],up:['📈','UP','up'],down:['📉','DOWN','dn'],flat:['➡️','FLAT','fl']};
  var c=m[trend]||m.flat;
  return '<span class="tb '+c[2]+'">'+c[0]+' '+c[1]+' '+fP(delta)+'</span>';
}

// ===== Main draw =====
function draw(){
  var coins=[], i;
  for(i=0;i<S.coins.length;i++) if(S.coins[i].status==='active') coins.push(S.coins[i]);
  if(S.filt){var fl=S.filt.toLowerCase();coins=coins.filter(function(c){return c.symbol.toLowerCase().indexOf(fl)>=0||c.contract_address.toLowerCase().indexOf(fl)>=0;});}
  coins.sort(function(a,b){var va=a[S.sf],vb=b[S.sf];if(va==null)va=0;if(vb==null)vb=0;if(typeof va==='string'){va=va.toLowerCase();vb=String(vb).toLowerCase();}return S.sa?(va>vb?1:va<vb?-1:0):(va<vb?1:va>vb?-1:0);});

  var rows='';
  for(var ci=0;ci<coins.length;ci++){
    var c=coins[ci], exp=S.exp===c.contract_address;
    var cas=c.contract_address.slice(0,6)+'...'+c.contract_address.slice(-4);
    var hue=(c.symbol.charCodeAt(0)*37)%360;
    var gmgn=E(c.gmgn_url);
    var hcol=c.current_heat_score>3000?'var(--org)':c.current_heat_score>1000?'var(--cyan)':c.current_heat_score>300?'var(--pur)':'var(--t3)';
    var ageCol=c.age_hours>20?'var(--yel)':'var(--t2)';
    var lpCol=(c.lp_fdv_ratio||0)>.1?'var(--grn)':'var(--yel)';
    var eca=E(c.contract_address);

    rows+='<tr class="row'+(exp?' xp':'')+'" data-ca="'+eca+'">'
      +'<td class="l"><div class="scell"><div class="sico" style="background:hsl('+hue+',60%,25%);border:1px solid hsl('+hue+',60%,40%)">'+E(c.symbol.slice(0,2))+'</div><div><div class="sn">$'+E(c.symbol)+'</div><div class="st">'+(c.rugcheck_status==='Good'?'✅':'⚠️')+' '+(c.lp_locked?'LP🔒':'')+'</div></div></div></td>'
      +'<td style="color:'+ageCol+'">'+fAge(c.age_hours)+'</td>'
      +'<td style="color:var(--bluL)">'+fU(c.liquidity)+'</td>'
      +'<td style="font-weight:600">'+fU(c.fdv)+'</td>'
      +'<td style="color:'+lpCol+'">'+((c.lp_fdv_ratio||0)*100).toFixed(1)+'%</td>'
      +'<td style="color:var(--purL)">'+fU(c.volume_24h)+'</td>'
      +'<td style="color:var(--t2)">'+fN(c.holders)+'</td>'
      +'<td style="font-weight:700;font-size:13px;color:'+hcol+'">'+fN(c.current_heat_score)+'</td>'
      +'<td class="c">'+tbdg(c.heat_trend,c.heat_delta_percent)+'</td>'
      +'<td class="c">'+spark(c.heat_history)+'</td>'
      +'<td><a class="clink" href="'+gmgn+'" target="_blank" rel="noopener" data-stop="1">'+cas+'</a></td>'
      +'<td class="c"><button class="bdel" data-del="'+eca+'" data-stop="1">\u2715</button></td>'
      +'</tr>';

    if(exp){
      var la=c.heat_history.length?c.heat_history[c.heat_history.length-1]:null;
      var pcs=[['价格','$'+N(c.price).toFixed(8),''],['5m',fP(c.price_change_5m),c.price_change_5m>=0?'pos':'neg'],['1h',fP(c.price_change_1h),c.price_change_1h>=0?'pos':'neg'],['6h',fP(c.price_change_6h),c.price_change_6h>=0?'pos':'neg'],['24h',fP(c.price_change_24h),c.price_change_24h>=0?'pos':'neg'],['LP/FDV',((c.lp_fdv_ratio||0)*100).toFixed(2)+'%',''],['安全',c.security_passed?'✅通过':'❌未通过',''],['LP锁',c.lp_locked?'🔒是':'🔓否','']];
      var mg='';for(var j=0;j<pcs.length;j++){mg+='<div><div class="ml">'+pcs[j][0]+'</div><div class="mv '+pcs[j][2]+'">'+pcs[j][1]+'</div></div>';}

      var lh='';
      if(la){
        var ls=[['提及',N(la.mentions)],['平均互动',N(la.avg_eng).toFixed(1)],['KOL',N(la.kol_count)],['KOL占比',(N(la.kol_ratio)*100).toFixed(1)+'%'],['总互动',N(la.total_engagement)],['CA提及率',(N(la.ca_mention_ratio)*100).toFixed(1)+'%']];
        lh='<div style="margin-top:10px" class="mgrid"><div style="grid-column:1/-1;font-size:10px;color:var(--t3);margin-bottom:3px">最新热度 \u00b7 '+tAgo(la.timestamp)+' ago</div>';
        for(j=0;j<ls.length;j++) lh+='<div><div class="ml">'+ls[j][0]+'</div><div class="mv" style="color:var(--bluL)">'+ls[j][1]+'</div></div>';
        lh+='</div>';
      }

      var lnks=[['GMGN',c.gmgn_url],['Birdeye','https://birdeye.so/token/'+c.contract_address+'?chain=solana'],['DexScreener','https://dexscreener.com/solana/'+c.contract_address],['Solscan','https://solscan.io/token/'+c.contract_address]];
      var lnkH='';for(j=0;j<lnks.length;j++) lnkH+='<a class="elink" href="'+E(lnks[j][1])+'" target="_blank" rel="noopener">'+lnks[j][0]+' \u2197</a>';

      rows+='<tr class="drow"><td colspan="12"><div class="din">'
        +'<div class="dleft"><div class="dtit">\ud83d\udcca X热度 vs FDV 趋势 (每15分钟) <small>'+c.heat_history.length+' 数据点</small></div><div class="cbox">'+dchart(c.heat_history, c.fdv_history)+'</div></div>'
        +'<div class="dright"><div class="dtit">\ud83d\udccb 实时指标</div><div class="mgrid">'+mg+'</div>'+lh+'<div class="lrow">'+lnkH+'</div></div>'
        +'</div></td></tr>';
    }
  }

  var n=coins.length;
  var cBg=S.conn?'background:rgba(20,83,45,.22);border:1px solid rgba(22,163,74,.22)':'background:rgba(120,53,15,.22);border:1px solid rgba(217,119,6,.22)';
  var cDot=S.conn?'#22c55e':'#f59e0b';
  var cTxt=S.conn?'已连接':'演示模式';
  var cTxC=S.conn?'#86efac':'#fcd34d';

  function th(f,label,cls){
    var on=S.sf===f?' on':'';
    var arr=S.sf===f?(S.sa?' \u2191':' \u2193'):'';
    return '<th class="'+(cls||'')+on+'" data-sort="'+f+'">'+label+arr+'</th>';
  }

  var html='<div class="hdr"><div class="hdr-l"><div class="logo">S</div><div><div class="hdr-t">SOL 二段监控</div><div class="hdr-s">Second Wave Trading Monitor</div></div></div>'
    +'<div class="hdr-r"><input class="sinput" id="sfilt" placeholder="搜索 Symbol / CA..." value="'+E(S.filt)+'">'
    +'<div class="pill" style="'+cBg+'"><div class="dot" style="background:'+cDot+';box-shadow:0 0 5px '+cDot+'80"></div><span style="color:'+cTxC+'">'+cTxt+'</span></div>'
    +'<div class="pill" style="background:rgba(14,165,233,.07);border:1px solid rgba(14,165,233,.16);color:var(--bluL)">监控 <b style="color:var(--cyan)">'+n+'</b> 个币</div>'
    +'<button class="btn-add" id="badd">+ 手动添加</button></div></div>';

  html+='<div class="twrap"><table><thead><tr>'
    +th('symbol','Symbol','l ')+th('age_hours','Age','')+th('liquidity','LP','')
    +th('fdv','FDV','')+th('lp_fdv_ratio','LP/FDV','')+th('volume_24h','Volume','')
    +th('holders','Holders','')+th('current_heat_score','X热度','')
    +'<th class="c">趋势</th><th class="c">热度图</th><th class="l">合约地址</th><th></th>'
    +'</tr></thead><tbody>'+rows+'</tbody></table>';
  if(n===0) html+='<div class="empty"><b>\ud83d\udd0d</b><div style="font-size:13px">暂无监控代币</div><div style="font-size:11px;margin-top:6px">等待DexScreener自动扫描 或 手动添加</div></div>';
  html+='</div>';

  html+='<div class="ftr"><div>DexScreener: 每5min \u00b7 Birdeye: 每30s \u00b7 X热度: 每15min</div><div>退出: FDV&lt;$50K | Age&gt;24h | 连续2次低热度'+(S.lu?' \u00b7 '+S.lu.toLocaleTimeString():'')+'</div></div>';

  if(S.modal){
    html+='<div class="mbg" id="mbg"><div class="mdl" id="mdlbox"><h3>手动添加代币</h3>'
      +'<label>合约地址 (CA)</label><input id="mca" placeholder="完整合约地址">'
      +'<label>代币符号</label><input id="msym" placeholder="例如: BONK">'
      +'<div class="mact"><button class="mcan" id="mcancel">取消</button><button class="mok" id="mconfirm">添加监控</button></div>'
      +'</div></div>';
  }

  document.getElementById('app').innerHTML=html;
  bindEv();
}

function bindEv(){
  var sf=document.getElementById('sfilt');
  if(sf){
    sf.addEventListener('input',function(){
      S.filt=this.value;
      draw();
      var el=document.getElementById('sfilt');
      if(el){el.focus();try{el.setSelectionRange(S.filt.length,S.filt.length);}catch(e){}}
    });
  }

  var ba=document.getElementById('badd');
  if(ba) ba.addEventListener('click',function(){S.modal=true;draw();});

  var ths=document.querySelectorAll('th[data-sort]');
  for(var i=0;i<ths.length;i++){
    ths[i].addEventListener('click',function(){
      var f=this.getAttribute('data-sort');
      if(S.sf===f) S.sa=!S.sa; else {S.sf=f;S.sa=false;}
      draw();
    });
  }

  var trs=document.querySelectorAll('tr.row');
  for(i=0;i<trs.length;i++){
    trs[i].addEventListener('click',function(e){
      if(e.target.closest('[data-stop]')) return;
      var ca=this.getAttribute('data-ca');
      S.exp=S.exp===ca?null:ca;
      draw();
    });
  }

  var dels=document.querySelectorAll('[data-del]');
  for(i=0;i<dels.length;i++){
    dels[i].addEventListener('click',function(e){
      e.stopPropagation();
      apiDel(this.getAttribute('data-del'));
    });
  }

  var mbg=document.getElementById('mbg');
  if(mbg){
    mbg.addEventListener('click',function(e){if(e.target===mbg){S.modal=false;draw();}});
    var mc=document.getElementById('mcancel');
    if(mc) mc.addEventListener('click',function(){S.modal=false;draw();});
    var mk=document.getElementById('mconfirm');
    if(mk) mk.addEventListener('click',function(){
      var ca=(document.getElementById('mca').value||'').trim();
      var sym=(document.getElementById('msym').value||'').trim().toUpperCase()||'???';
      if(ca.length>20) apiAdd(ca,sym);
    });
  }
}

// ===== Boot =====
load();
setInterval(load, POLL);

})();
</script>
